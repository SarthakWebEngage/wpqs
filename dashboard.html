<!DOCTYPE html>
<html>
<head>
    <title>Personalization Insights Dashboard</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body { font-family: Arial; margin: 20px; }
        .kpi-container { display: flex; gap: 20px; flex-wrap: wrap; }
        .card {
            padding: 20px;
            border-radius: 10px;
            background: #f5f5f5;
            width: 200px;
        }
        canvas { margin-top: 30px; }
        .insights { margin-top: 40px; }
    </style>
</head>

<body>

<h1>📊 Personalization Dashboard</h1>

<!-- KPI Cards -->
<div class="kpi-container">
    <div class="card"><h3>Avg Launch Time</h3><p id="avgLaunch"></p></div>
    <div class="card"><h3>Engg Dependency</h3><p id="dependency"></p></div>
    <div class="card"><h3>Template Opportunity</h3><p id="reuse"></p></div>
    <div class="card"><h3>Performance Issues</h3><p id="performance"></p></div>
</div>

<!-- Charts -->
<canvas id="launchChart"></canvas>
<canvas id="dependencyChart"></canvas>
<canvas id="featureChart"></canvas>

<!-- 🚀 Overlay Impact Section -->
<h2>🚀 Overlay Impact</h2>

<div class="kpi-container">
    <div class="card"><h3>Before (days)</h3><p id="beforeAvg"></p></div>
    <div class="card"><h3>After (days)</h3><p id="afterAvg"></p></div>
    <div class="card"><h3>Improvement</h3><p id="improvement"></p></div>
    <div class="card"><h3>2x+ Faster</h3><p id="fastPercent"></p></div>
</div>

<canvas id="overlayChart"></canvas>
<canvas id="speedChart"></canvas>

<!-- Insights -->
<div class="insights">
    <h2>🧠 Insights</h2>
    <ul id="insightsList"></ul>
</div>

<script type="module">

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCGiBGcPbW-BIaGH5BFXM21XxvWXELGSrM",
        authDomain: "training-37d3a.firebaseapp.com",
        projectId: "training-37d3a",
        storageBucket: "training-37d3a.firebasestorage.app",
        messagingSenderId: "532862216436",
        appId: "1:532862216436:web:bc3e09415d2ae871bed6a1"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const snapshot = await getDocs(collection(db, "surveyResponses"));
    const data = snapshot.docs.map(doc => doc.data());

    const launchMap = {
        "<1 day": 1,
        "1–3 days": 2,
        "3–7 days": 5,
        ">7 days": 8
    };

    /* ---------- KPI Calculations ---------- */

    let totalLaunch = 0, depCount = 0, reuseHigh = 0, perfIssues = 0;

    data.forEach(d => {
        totalLaunch += launchMap[d.launchTime] || 0;
        if (["Always", "Often"].includes(d.dependency)) depCount++;
        if (["50–80%", ">80%"].includes(d.reuse)) reuseHigh++;
        if (d.performanceIssue === "Yes") perfIssues++;
    });

    const n = data.length || 1;

    avgLaunch.innerText = (totalLaunch / n).toFixed(1) + " days";
    dependency.innerText = ((depCount / n) * 100).toFixed(0) + "%";
    reuse.innerText = ((reuseHigh / n) * 100).toFixed(0) + "%";
    performance.innerText = ((perfIssues / n) * 100).toFixed(0) + "%";

    /* ---------- Charts ---------- */

    // Launch Distribution
    const launchCounts = {};
    data.forEach(d => {
        launchCounts[d.launchTime] = (launchCounts[d.launchTime] || 0) + 1;
    });

    new Chart(launchChart, {
        type: "bar",
        data: { labels: Object.keys(launchCounts), datasets: [{ data: Object.values(launchCounts) }] }
    });

    // Dependency Chart
    const depMap = {};
    data.forEach(d => {
        depMap[d.dependency] = (depMap[d.dependency] || 0) + 1;
    });

    new Chart(dependencyChart, {
        type: "pie",
        data: { labels: Object.keys(depMap), datasets: [{ data: Object.values(depMap) }] }
    });

    // Feature Demand
    let dnd=0, template=0, selector=0;

    data.forEach(d => {
        if (["Very useful","Critical"].includes(d.dndImpact)) dnd++;
        if (["Very useful","Critical"].includes(d.templateImpact)) template++;
        if (["High","Critical"].includes(d.selectorImportance)) selector++;
    });

    new Chart(featureChart, {
        type: "bar",
        data: { labels: ["DnD","Templates","Selector"], datasets: [{ data: [dnd,template,selector] }] }
    });

    /* ---------- 🚀 Overlay Impact ---------- */

    let beforeTotal=0, afterTotal=0, overlayCount=0, fastCount=0, depReduced=0;

    data.forEach(d => {
        if (d.beforeOverlayTime && d.afterOverlayTime) {
            const b = launchMap[d.beforeOverlayTime];
            const a = launchMap[d.afterOverlayTime];

            if (b && a) {
                beforeTotal += b;
                afterTotal += a;
                overlayCount++;

                if (["2x","3x+"].includes(d.overlaySpeedImpact)) fastCount++;

                if (["Significant","Somewhat"].includes(d.overlayDependencyImpact)) depReduced++;
            }
        }
    });

    const safeCount = overlayCount || 1;

    const beforeAvg = beforeTotal / safeCount;
    const afterAvg = afterTotal / safeCount;
    const improvement = ((beforeAvg - afterAvg) / beforeAvg) * 100 || 0;

    beforeAvgEl = document.getElementById("beforeAvg");
    afterAvgEl = document.getElementById("afterAvg");
    improvementEl = document.getElementById("improvement");
    fastPercentEl = document.getElementById("fastPercent");

    beforeAvgEl.innerText = beforeAvg.toFixed(1);
    afterAvgEl.innerText = afterAvg.toFixed(1);
    improvementEl.innerText = improvement.toFixed(0) + "%";
    fastPercentEl.innerText = ((fastCount / safeCount) * 100).toFixed(0) + "%";

    // Overlay Chart
    new Chart(overlayChart, {
        type: "bar",
        data: { labels: ["Before","After"], datasets: [{ data: [beforeAvg, afterAvg] }] }
    });

    // Speed Distribution
    let speedMap={};
    data.forEach(d=>{
        if(d.overlaySpeedImpact){
            speedMap[d.overlaySpeedImpact]=(speedMap[d.overlaySpeedImpact]||0)+1;
        }
    });

    new Chart(speedChart,{
        type:"pie",
        data:{labels:Object.keys(speedMap),datasets:[{data:Object.values(speedMap)}]}
    });

    /* ---------- Insights ---------- */

    const insights = [];

    if (depCount / n > 0.5)
        insights.push("High engineering dependency slowing campaigns.");

    if (reuseHigh / n > 0.5)
        insights.push("Strong template opportunity.");

    if (perfIssues / n > 0.3)
        insights.push("Performance issues affecting UX.");

    if (totalLaunch / n > 3)
        insights.push("Slow campaign launch limits experimentation.");

    if (improvement > 30)
        insights.push(`Overlay improved GTM by ${improvement.toFixed(0)}%`);

    if (fastCount / safeCount > 0.5)
        insights.push("Majority report 2x+ faster campaign creation.");

    if (depReduced / safeCount > 0.5)
        insights.push("Overlay reduces engineering dependency significantly.");

    document.getElementById("insightsList").innerHTML =
        insights.map(i => `<li>${i}</li>`).join("");

</script>

</body>
</html>
